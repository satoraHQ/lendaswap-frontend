packages:
  # specify a package in a direct subdir of the root
  - "apps/**"
  # all packages in direct subdirs of packages/
  - "packages/*"
  # client-sdk TypeScript SDK
  #- "../client-sdk/ts-pure-sdk"  # excluded: pinned to a published SDK
  - "!**/dist/**"

# pnpm 10 only runs native build scripts for allowlisted packages, and the
# allowlist must live at the workspace root (not in a member package, where it
# is silently ignored). better-sqlite3 needs this to compile its binding.
onlyBuiltDependencies:
  - better-sqlite3
  - bufferutil
  - esbuild
  - utf-8-validate
